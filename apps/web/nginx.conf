server {
    listen 80;
    server_name localhost;

    # Proxy /docs (Swagger UI) to the API container
    location /docs {
        proxy_pass http://api:3001/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy all /send_message, /send_media, /status, /auth, /login, /logout to the API
    location ~ ^/(send_message|send_media|status|auth|login|logout) {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the frontend SPA
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
